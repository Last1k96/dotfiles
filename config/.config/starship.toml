"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false

format = """
$directory\
[](fg:fg4 bg:bg1)\
$git_branch\
$git_status\
[](fg:bg1)\
$jobs\
$character"""

right_format = """[](fg:bg1)[$cmd_duration $status ](bg:bg1)"""

palette = 'gruvbox_dark'

[username]
show_always = false
style_root = "bold fg:red bg:bg1"
style_user = "fg:fg1 bg:bg1"
format = "[$user]($style) "

[hostname]
ssh_only = true
style = "fg:fg1 bg:bg1"
format = "[@$hostname]($style) "

[directory]
style = "bg:bg1 fg:dir_fg"
repo_root_style = "bold bg:bg1 fg:dir_fg"
format = "[ $path$read_only ]($style)"
repo_root_format = "[ $before_root_path]($style)[$repo_root]($repo_root_style)[$path$read_only ]($style)"
truncation_length = 5
truncation_symbol = "…/"
truncate_to_repo = false
read_only = " 󰌾"


[git_branch]
symbol = "\ue0a0"
style = "bg:bg1 fg:fg1"
format = '[ $symbol ](fg:git_icon bg:bg1)[$branch](fg:git_branch bg:bg1)'
truncation_length = 32
truncation_symbol = "…"

[git_status]
style = "bg:bg1"
ahead = " ⇡${count}"
behind = " ⇣${count}"
diverged = " ⇡${ahead_count}⇣${behind_count}"
conflicted = " ~${count}"
staged = " +${count}"
modified = " !${count}"
untracked = " ?${count}"
deleted = " ✘${count}"
stashed = " *${count}"
renamed = " »${count}"
format = '[([$ahead_behind](fg:gs_ahead bg:bg1)[$stashed](fg:fg3 bg:bg1)[$conflicted](fg:gs_conflict bg:bg1)[$staged](fg:gs_staged bg:bg1)[$modified](fg:gs_unstaged bg:bg1)[$untracked](fg:gs_untracked bg:bg1)[$deleted](fg:gs_untracked bg:bg1)[$renamed](fg:fg4 bg:bg1) )](bg:bg1)'

[line_break]
disabled = true

[character]
disabled = false
success_symbol = '[❯](bold fg:green)'
error_symbol = '[❯](bold fg:red)'
vimcmd_symbol = '[❮](bold fg:green)'
vimcmd_replace_one_symbol = '[❮](bold fg:purple)'
vimcmd_replace_symbol = '[❮](bold fg:purple)'
vimcmd_visual_symbol = '[❮](bold fg:yellow)'

[cmd_duration]
min_time = 3000
style = "fg:bg0 bg:bg1"
format = "[$duration]($style)"
disabled = false

[status]
disabled = false
format = "[✘$status]($style)"
style = "fg:yellow"

[jobs]
style = "fg:aqua bg:bg1"
format = "[$symbol]($style) "
symbol = "✦"
number_threshold = 1

[palettes.gruvbox_dark]
bg0 = "#282828"
bg1 = "#303030"
bg2 = "#504945"
bg3 = "#665c54"
bg4 = "#7c6f64"
fg0 = "#fbf1c7"
fg1 = "#ebdbb2"
fg2 = "#d5c4a1"
fg3 = "#bdae93"
fg4 = "#a89984"
dir_fg = "#afaf87"
git_icon = "#808080"
git_branch = "#5f5fd7"
gs_ahead = "#d0d0d0"
gs_staged = "#008000"
gs_unstaged = "#808000"
gs_untracked = "#ff0000"
gs_conflict = "#00ff00"
red = "#fb4934"
green = "#b8bb26"
yellow = "#fabd2f"
blue = "#83a598"
purple = "#d3869b"
aqua = "#8ec07c"
orange = "#fe8019"
