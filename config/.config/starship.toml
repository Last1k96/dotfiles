"$schema" = 'https://starship.rs/config-schema.json'

format = """
$username\
$hostname\
$directory\
[](fg:bg1 bg:yellow)\
$git_branch\
$git_status\
[](fg:yellow)\
$jobs\
$character"""

right_format = """$cmd_duration $status"""

palette = 'gruvbox_dark'

[username]
show_always = false
style_root = "bold fg:red bg:bg1"
style_user = "fg:fg1 bg:bg1"
format = "[$user]($style) "

[hostname]
ssh_only = true
style = "fg:fg1 bg:bg1"
format = "[@$hostname]($style) "

[directory]
style = "bg:bg1 fg:fg1"
format = "[ $path$read_only ]($style)"
truncation_length = 3
truncation_symbol = "…/"
read_only = " 󰌾"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = "󰝚 "
"Pictures" = " "
"Developer" = "󰲋 "

[git_branch]
symbol = "\ue0a0"
style = "bg:bg1 fg:fg1"
format = '[[ $symbol $branch ](fg:fg1 bg:bg1)]($style)'
truncation_length = 32
truncation_symbol = "…"

[git_status]
style = "bg:bg1"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇡${ahead_count}⇣${behind_count}"
conflicted = "~${count}"
staged = "+${count}"
modified = "!${count}"
untracked = "?${count}"
deleted = "✘${count}"
stashed = "*${count}"
renamed = "»${count}"
format = '[([$ahead_behind](fg:fg3 bg:bg1)[$stashed](fg:fg3 bg:bg1)[$conflicted](fg:aqua bg:bg1)[$staged](fg:green bg:bg1)[$modified](fg:yellow bg:bg1)[$untracked](fg:red bg:bg1)[$deleted](fg:red bg:bg1)[$renamed](fg:fg4 bg:bg1) )](bg:bg1)'

[line_break]
disabled = true

[character]
disabled = false
success_symbol = '[❯](bold fg:green bg:bg1)'
error_symbol = '[❯](bold fg:red bg:bg1)'
vimcmd_symbol = '[❮](bold fg:green bg:bg1)'
vimcmd_replace_one_symbol = '[❮](bold fg:purple bg:bg1)'
vimcmd_replace_symbol = '[❮](bold fg:purple bg:bg1)'
vimcmd_visual_symbol = '[❮](bold fg:yellow bg:bg1)'

[cmd_duration]
min_time = 3000
style = "fg:fg4"
format = "[$duration]($style)"
disabled = false

[status]
disabled = false
format = "[$status]($style)"
style = "fg:red"

[jobs]
style = "fg:blue bg:bg1"
format = "[$symbol$number]($style) "
symbol = "✦"
number_threshold = 2

[palettes.gruvbox_dark]
bg0 = "#282828"
bg1 = "#3c3836"
bg2 = "#504945"
bg3 = "#665c54"
bg4 = "#7c6f64"
fg0 = "#fbf1c7"
fg1 = "#ebdbb2"
fg2 = "#d5c4a1"
fg3 = "#bdae93"
fg4 = "#a89984"
red = "#fb4934"
green = "#b8bb26"
yellow = "#fabd2f"
blue = "#83a598"
purple = "#d3869b"
aqua = "#8ec07c"
orange = "#fe8019"
